version: 1.3.11
cache: true

interface:
  endpoints:
    google: false
    googleAIStudio: true

speech:
  speechTab:
    conversationMode: true
    advancedMode: false
  textToSpeech:
    engineTTS: "external"
    voice: "alloy"
    languageTTS: "en"
    automaticPlayback: true
    playbackRate: 1.0
    cacheTTS: true
  tts:
    elevenlabs:
      apiKey: "${TTS_API_KEY}"
      model: "eleven_multilingual_v2"
      voices: ["EST9Ui6982FZPSi7gCHi"]

# THIS BLOCK STOPS THE SEARCH TOOL FROM LOOKING FOR AUTH.JSON
credentials:
  googleCustomSearch:
    apiKey: "${GOOGLE_SEARCH_API_KEY}"
    cx: "${GOOGLE_CSE_ID}"
