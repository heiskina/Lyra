version: 1.3.11
cache: true

endpoints:
  custom:
    - name: "Gemini AI"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://googleapis.com"
      models:
        default: ["gemini-2.5-flash", "gemini-2.5-pro", "gemini-1.5-flash", "gemini-1.5-pro"]
        fetch: false
      titleConvo: true
      summarize: false

speech:
  speechTab:
    conversationMode: true
    advancedMode: false
  textToSpeech:
    engineTTS: "external"
    voice: "alloy"
    languageTTS: "en"
    automaticPlayback: true
    playbackRate: 1.0
    cacheTTS: true
  tts:
    elevenlabs:
      apiKey: "${ELEVENLABS_API_KEY}"
      model: "eleven_multilingual_v2"
      voices: ["EST9Ui6982FZPSi7gCHi"]
