version: 1.3.11
cache: true

endpoints:
  custom:
    - name: "Gemini AI"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      models:
        default: ["gemini-3.1-pro-preview","gemini-2.5-pro","gemini-2.5-flash","gemini-1.5-pro","gemini-1.5-flash"]
      fetch: false
      titleConvo: true
      summarize: false

speech:
  tts:
    elevenlabs:
      apiKey: "${ELEVENLABS_API_KEY}"
      model: "eleven_multilingual_v2"
      voices:
        - voiceId: "4NejU5DwQjevnR6mh3mb"
          condition:
            stability: 0.5
            similarity_boost: 0.75
