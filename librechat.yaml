version: 1.3.11
cache: true

endpoints:
  custom:
    - name: "Gemini AI"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      models:
          default: ["gld-gemini-2.5-flash", "gld-gemini-2.5-pro", "gld-1.5-flash", "gld-1.5-pro"]
        fetch: false
      titleConvo: true
      summarize: false

speech:
  speechTab:
    conversationMode: true
    advancedMode: false
  textToSpeech:
    engineTTS: "external"
    voice: "EST9Ui6982FZPSi7gCHi"
    languageTTS: "en"
    automaticPlayback: true
    playbackRate: 1.0
    cacheTTS: true
  tts:
    elevenlabs:
      apiKey: "${ELEVENLABS_API_KEY}"
      model: "eleven_multilingual_v2"
      voices: ["EST9Ui6982FZPSi7gCHi"]
