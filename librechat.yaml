version: 1.3.11
cache: true

endpoints:
  custom:
    - name: "Gemini AI"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      models:
        default: ["gemini-3.1-pro-preview","gemini-2.5-pro","gemini-2.5-flash","gemini-1.5-pro","gemini-1.5-flash"]
      fetch: false
      titleConvo: true
      summarize: false

version: 1.0.5
speech:
  TTS: elevenlabs # Sets ElevenLabs as the provider
  elevenlabs:
    apiKey: d0ce800d19624a6832004cd30ea49f91d8960b7c245799fafb3a674311299be9 # Or reference an environment variable
    voiceId: 4NejU5DwQjevnR6mh3mb (Lyra)
    # Optional settings:
    model: eleven_multilingual_v2 # Recommended model
    stability: 0.5 # Default is 0.5, adjust for more emotion/less robotic tone
    similarity_boost: 0.75

